services:
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - inference-net
    restart: unless-stopped

  inference:
    build:
      context: ./services/inference
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
    networks:
      - inference-net
    restart: unless-stopped

  collector:
    build:
      context: ./services/collector
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    networks:
      - inference-net
    restart: unless-stopped

networks:
  inference-net:
    driver: bridge
