apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  labels:
    app: collector
    layer: "1"
    version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
        layer: "1"
        version: "0.1.0"
    spec:
      containers:
        - name: collector
          image: inference-reliability-platform-collector:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: collector
  labels:
    app: collector
    layer: "1"
spec:
  type: ClusterIP
  selector:
    app: collector
  ports:
    - port: 8000
      targetPort: 8000
