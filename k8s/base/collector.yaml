apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  labels:
    app: collector
    layer: "1"
    version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
        layer: "1"
        version: "0.1.0"
    spec:
      containers:
        - name: collector
          image: us-south1-docker.pkg.dev/ai-inference-497423/inference-repo/collector:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
          envFrom:
            - configMapRef:
                name: collector-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: collector
  labels:
    app: collector
    layer: "1"
spec:
  type: ClusterIP
  selector:
    app: collector
  ports:
    - port: 8000
      targetPort: 8000
